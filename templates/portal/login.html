{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Devexify Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #3b82f6 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 28px;
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
        }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo img { height: 60px; }
        .login-title { font-size: 28px; font-weight: 800; color: #111827; margin-bottom: 8px; }
        .login-sub { color: #6b7280; margin-bottom: 35px; font-size: 15px; }
        .form-label { font-weight: 600; color: #374151; font-size: 15px; }
        .form-control {
            height: 55px; border-radius: 14px;
            border: 1.5px solid #e5e7eb; padding: 0 18px;
            font-size: 16px; transition: .3s;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,.12);
        }
        .input-icon { position: relative; }
        .input-icon i {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%); color: #9ca3af; font-size: 18px;
        }
        .input-icon .form-control { padding-left: 50px; }
        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff; border: none; width: 100%;
            height: 55px; border-radius: 14px;
            font-size: 17px; font-weight: 700;
            margin-top: 10px; transition: .35s; cursor: pointer;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(37,99,235,.35); }
        .alert-danger { border-radius: 14px; font-size: 15px; }
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
        .portal-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: #eaf2ff; color: #2563eb;
            padding: 10px 22px; border-radius: 50px;
            font-size: 14px; font-weight: 700; margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <img src="{% static 'images/devlogo.png' %}" alt="Devexify">
    </div>

    <div class="text-center">
        <div class="portal-badge">🎓 Student Portal</div>
        <h2 class="login-title">Welcome Back!</h2>
        <p class="login-sub">Login to access your courses and profile</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger mb-3">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label">Username</label>
            <div class="input-icon">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <div class="input-icon">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="fa-solid fa-right-to-bracket me-2"></i> Login to Portal
        </button>
    </form>

    <div class="back-link">
        <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left me-1"></i> Back to Website</a>
    </div>
</div>
</body>
</html>
